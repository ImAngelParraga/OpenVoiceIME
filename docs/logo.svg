<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">OpenVoiceIME primary app icon</title>
  <desc id="desc">Rounded square Android-style icon with a microphone, transcription lines, and an input caret.</desc>
  <rect width="512" height="512" rx="112" fill="#111418"/>

  <!-- Microphone: local voice input -->
  <rect x="116" y="104" width="128" height="198" rx="64" fill="none" stroke="#F4F7FA" stroke-width="32"/>
  <rect x="168" y="152" width="24" height="96" rx="12" fill="#45C18D"/>
  <path d="M180 302V356" fill="none" stroke="#F4F7FA" stroke-width="32" stroke-linecap="round"/>
  <path d="M134 356H226" fill="none" stroke="#F4F7FA" stroke-width="32" stroke-linecap="round"/>

  <!-- Transcription output: inserted text + cursor -->
  <rect x="286" y="160" width="92" height="26" rx="13" fill="#F4F7FA"/>
  <rect x="286" y="226" width="132" height="26" rx="13" fill="#F4F7FA"/>
  <rect x="286" y="292" width="100" height="26" rx="13" fill="#F4F7FA"/>
  <rect x="414" y="280" width="24" height="50" rx="12" fill="#45C18D"/>
</svg>
